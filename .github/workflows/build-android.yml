name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      - name: Build Profile APK
        # Debug-режим Flutter выполняется через JIT без единой оптимизации --
        # это ожидаемо в разы медленнее оригинального Komet, собранного в
        # release/AOT, независимо от того, что менялось в коде приложения.
        # Profile-сборка тоже AOT-компилируется (как release), поэтому даёт
        # реальную, показательную производительность (близкую к продакшену),
        # но при этом остаётся штатно устанавливаемым APK для быстрого теста
        # без публикации в Play Store.
        run: flutter build apk --profile --flavor komet

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-komet-profile.apk \
             build/app/outputs/flutter-apk/app-mayak-profile.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mayak-profile-apk
          path: build/app/outputs/flutter-apk/app-mayak-profile.apk
          if-no-files-found: error
          retention-days: 30
